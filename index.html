<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uxban | Official Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="noise"></div>

  <nav class="top-bar">
    <div class="logo-wrap"><a href="index.html"><img src="logo.png" alt="uxban" class="nav-logo"></a></div>
    <div class="nav-links"><a href="store.html">STORE</a><a href="archive.html">LOG</a></div>
    <div class="nav-info"><span class="dot"></span><small>x34 MUSIC</small></div>
  </nav>

  <div class="page-wrap">
    <main>
      <header class="hero">
        <div class="hero-bg">
          <img src="hero.jpg" alt="">
          <div class="hero-fade"></div>
        </div>
        <div class="hero-content">
          <img src="logo.png" alt="uxban" class="hero-logo">
          <h1 class="hero-title">UXTRA</h1>
          <p class="sub-text">Out Now // 11 Songs. 2026.</p>
        </div>
      </header>

      <section class="work-grid">

        <div class="work-item large"
          data-title="UXTRA"
          data-year="2026"
          data-spotify="https://open.spotify.com/album/62Qw3eFdZ9SpvHqsVDKuDt"
          data-apple="https://music.apple.com/album/uxtra/1890788021"
          data-yt="https://music.youtube.com/playlist?list=OLAK5uy_m73sxIBNrIyaa6ScNtXQwPoLGZfn5GYeY">
          <div class="img-box"><img src="cover1.jpg" alt="UXTRA"></div>
          <div class="label"><span>01</span><span>ALBUM</span></div>
        </div>

        <div class="work-item"
          data-title="Things You Can't Prove"
          data-year="2026"
          data-spotify="https://open.spotify.com/track/2RDGhwgpZBCLxAv2S9HjIE?si=d25ece4ae3ab4fd1"
          data-apple="https://music.apple.com/us/song/things-you-cant-prove/1890788386"
          data-yt="https://music.youtube.com/watch?v=fN7DrcUYDOE&si=AVBOWx6vVxOykETd">
          <div class="img-box"><img src="cover2.jpg" alt="Things You Can't Prove"></div>
          <div class="label"><span>02</span><span>SINGLE</span></div>
        </div>

        <div class="work-item"
          data-title="Freddy Krue"
          data-year="2026"
          data-spotify="https://open.spotify.com/album/74vhHwUhDXZWKv3DOxiSnq"
          data-apple="https://music.apple.com/us/album/freddy-krue-feat-vzee-single/1879704694"
          data-yt="https://music.youtube.com/watch?v=jPwt2_NsCIM&si=urizlkt9LO8D4HJE">
          <div class="img-box"><img src="cover3.jpg" alt="Freddy Krue"></div>
          <div class="label"><span>03</span><span>SINGLE</span></div>
        </div>

      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-top">
        <div class="footer-col">
          <small>SOCIALS</small>
          <a href="https://instagram.com/uxbanwtf" target="_blank">INSTAGRAM</a>
          <a href="https://tiktok.com/@uxba_n" target="_blank">TIKTOK</a>
          <a href="https://x.com/uxba_n" target="_blank">X / TWITTER</a>
        </div>
        <div class="footer-col"></div>
      </div>
      <div class="footer-bottom">
        <p>© 2026 UXBAN // x34 MUSIC</p>
        <p>DID YOU KNOW, UXBAN'S FIRST SONG WAS RELEASED IN 2024?</p>
      </div>
    </footer>
  </div>

  <div class="modal" id="modal">
    <div class="modal-close">CLOSE [X]</div>
    <div class="modal-content">
      <img id="modal-img" src="">
      <div class="modal-text">
        <h2 id="modal-title"></h2>
        <p id="modal-year"></p>
        <div class="links">
          <a href="#" id="link-spotify" target="_blank">SPOTIFY</a>
          <a href="#" id="link-apple" target="_blank">APPLE MUSIC</a>
          <a href="#" id="link-yt" target="_blank">YOUTUBE MUSIC</a>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
